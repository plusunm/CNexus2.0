<!DOCTYPE html>
<html lang=zh-CN>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>CNexus Float</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
.float-window{width:100%;height:100%;display:flex;flex-direction:column;background:rgba(7,11,20,.88);backdrop-filter:blur(12px);border:1px solid rgba(48,54,61,.6);border-radius:12px;overflow:hidden;user-select:none}
.float-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid rgba(48,54,61,.4);cursor:grab;flex-shrink:0}
.float-header:active{cursor:grabbing}
.float-brand{display:flex;align-items:center;gap:6px}
.float-brand .logo{font-size:14px}
.float-brand h1{font-size:12px;font-weight:600;color:#58a6ff}
.float-header-right{display:flex;align-items:center;gap:6px}
.float-status{display:flex;align-items:center;gap:4px;font-size:9px;color:#8b949e}
.float-status .dot{width:6px;height:6px;border-radius:50%}
.dot.green{background:#3fb950}.dot.orange{background:#d29922}.dot.red{background:#f85149}
.float-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;color:#8b949e;font-size:11px;cursor:pointer}
.float-btn:hover{background:rgba(255,255,255,.08);color:#e1e4e8}
.float-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px 12px;gap:6px}
.cog-mini{display:flex;gap:4px;flex-wrap:wrap}
.cog-tag{font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.04);color:#8b949e;white-space:nowrap}
.cog-tag .val{color:#e1e4e8;font-weight:600}
.chat-mini{flex:1;display:flex;flex-direction:column;gap:4px;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;padding:2px 0}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
.msg-mini{font-size:10px;padding:3px 6px;border-radius:4px;white-space:pre-wrap;word-break:break-word;max-width:90%;line-height:1.4}
.msg-mini.user{align-self:flex-end;background:rgba(31,111,235,.3);color:#e1e4e8}
.msg-mini.bot{align-self:flex-start;background:rgba(48,54,61,.4);color:#b0b8c4}
.chat-input-mini{display:flex;gap:4px;flex-shrink:0}
.chat-input-mini input{flex:1;padding:5px 8px;border:1px solid rgba(48,54,61,.6);border-radius:4px;background:rgba(13,17,23,.6);color:#e1e4e8;font-size:10px;outline:none}
.chat-input-mini input:focus{border-color:#58a6ff}
.chat-input-mini button{padding:5px 10px;border:none;border-radius:4px;background:#58a6ff;color:#fff;font-size:10px;cursor:pointer;flex-shrink:0}
.chat-input-mini button:hover{filter:brightness(1.1)}
.float-expand{display:flex;gap:4px;justify-content:flex-end;flex-shrink:0;padding:4px 0 0}
.float-expand button{font-size:9px;padding:3px 8px;border:1px solid rgba(48,54,61,.5);border-radius:4px;background:transparent;color:#8b949e;cursor:pointer}
.float-expand button:hover{background:rgba(255,255,255,.06);color:#e1e4e8}
.floating-mini-flow{flex:0 0 80px;background:rgba(0,0,0,.2);border-radius:6px;overflow:hidden;position:relative}
.floating-mini-flow canvas{width:100%;height:100%;display:block}
</style>
</head>
<body>
<div class=float-window id=float-window>
<div class=float-header id=float-header>
<div class=float-brand><span class=logo>N</span><h1>CNexus</h1></div>
<div class=float-header-right>
<div class=float-status><span class="dot green" id=float-dot></span><span id=float-status-text>就绪</span></div>
<button class=float-btn onclick=openDash() title="打开控制台">W</button>
</div>
</div>
<div class=float-body>
<div class=cog-mini id=cog-mini>
<span class=cog-tag>信念 <span class=val id=float-belief>0.00</span></span>
<span class=cog-tag>意图 <span class=val id=float-intent>—</span></span>
<span class=cog-tag>迭代 <span class=val id=float-iter>0</span></span>
<span class=cog-tag>记忆 <span class=val id=float-memory>0</span></span>
</div>
<div class=floating-mini-flow><canvas id=float-flow-canvas></canvas></div>
<div class=chat-mini>
<div class=chat-msgs id=float-chat-msgs><div class="msg-mini bot">CNexus 2.0 认知浮标已就绪</div></div>
<div class=chat-input-mini>
<input id=float-input placeholder="快速输入..." onkeydown="if(event.key==='Enter')floatSend()"><button onclick=floatSend()>-></button>
</div></div>
<div class=float-expand><button onclick=openDash()>+ 控制台</button><button onclick=resetSys()> 重置</button></div>
</div></div>
<script>
const API='';let floatFlowData=[];
async function api(p){const r=await fetch(API+p);return r.json()}
async function floatSend(){
 const inp=document.getElementById('float-input'),t=inp.value.trim();if(!t)return;inp.value='';
 const msgs=document.getElementById('float-chat-msgs');msgs.innerHTML+='<div class="msg-mini user">'+esc(t)+'</div>';msgs.scrollTop=msgs.scrollHeight;
 try{const d=await api('/api/converse?text='+encodeURIComponent(t));
  const reply=typeof d.reply==='object'?JSON.stringify(d.reply,null,2):d.reply||'';
  msgs.innerHTML+='<div class="msg-mini bot">'+esc(reply)+'</div>';upFloat(d)}
 catch(e){msgs.innerHTML+='<div class="msg-mini bot" style=color:#f85149>[err]</div>'}msgs.scrollTop=msgs.scrollHeight
}
async function pollStatus(){
 try{const d=await api('/api/status');upFloat(d);document.getElementById('float-dot').className='dot green';document.getElementById('float-status-text').textContent='就绪'}
 catch(e){document.getElementById('float-dot').className='dot orange';document.getElementById('float-status-text').textContent='重试...'}
}
function upFloat(d){
 if(!d)return;const cs=d.cog_state||d;
 if(cs.accumulated_weight!==undefined)document.getElementById('float-belief').textContent=cs.accumulated_weight.toFixed(3);
 if(cs.active_intent)document.getElementById('float-intent').textContent=cs.active_intent;
 if(cs.iteration!==undefined)document.getElementById('float-iter').textContent=cs.iteration;
 if(d.memory_count!==undefined)document.getElementById('float-memory').textContent=d.memory_count;
}
function openDash(){window.open(API+'/','_blank')}
async function resetSys(){
 try{await api('/api/reset');document.getElementById('float-chat-msgs').innerHTML='<div class="msg-mini bot">系统已重置</div>';pollStatus()}catch(e){}
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function drawFloatFlow(){
 const c=document.getElementById('float-flow-canvas'),p=c.parentElement;
 c.width=p.clientWidth||340;c.height=p.clientHeight||76;
 const ctx=c.getContext('2d'),w=c.width,h=c.height;ctx.clearRect(0,0,w,h);
 if(floatFlowData.length<2)return;
 const nodes=floatFlowData.map((e,i)=>{const t=2*Math.PI*i/floatFlowData.length;return{
  x:w/2+Math.cos(t)*(w/2-30),y:h/2+Math.sin(t)*(h/4),r:2+(e.weight||.5)*3,w:e.weight||.5
 }});
 const cols=['#3fb95058','#58a6ff58','#d2992258','#bc8cff58'];
 for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
  const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,d=Math.sqrt(dx*dx+dy*dy);
  if(d<150){ctx.strokeStyle='rgba(48,54,61,'+(.25*(1-d/150))+')';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke()}
 }
 for(const n of nodes){const c=cols[Math.floor(n.w*4)%4];ctx.fillStyle=c;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill()}
}
async function loadFloatFlow(){
 try{const d=await api('/api/memory_dump?limit=12');floatFlowData=d.entries||[];drawFloatFlow()}catch(e){}
}
loadFloatFlow();pollStatus();setInterval(pollStatus,3000);
</script>
</body>
</html>
